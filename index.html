<html style="background-color: black;">
<canvas id="my_canvas"></canvas>

<script>
const CANVAS_WIDTH = 800;
const CANVAS_HEIGHT = 600;
const SNAKE_SIZE = 20;

const canvas = document.getElementById("my_canvas");
canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

const ctx = canvas.getContext("2d");

let direction = "right";
let snake = [[200, 200]];

function draw(){
  clear_screen();
  draw_snake();
}

function clear_screen(){
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function draw_snake(){
  // Draw snake head
  const [head_x, head_y] = snake[0];

  ctx.fillStyle = "red";
  ctx.strokeStyle = "green";
  ctx.fillRect(head_x, head_y, SNAKE_SIZE, SNAKE_SIZE); 
  ctx.strokeRect(head_x, head_y, SNAKE_SIZE, SNAKE_SIZE);

  // Draw snake body
  ctx.fillStyle = "green";
  for (let i = 1; i < snake.length; i++){
    const [x, y] = snake[i];

    ctx.fillRect(x, y, SNAKE_SIZE, SNAKE_SIZE); 
  }
}

function initialize_body_parts(n){
  for (let i = 0; i < n; i++){
    const [last_x, last_y] = snake[snake.length - 1];

    snake.push([last_x - SNAKE_SIZE, last_y]);
  }
}

function update_game(){
  move_snake();
}

function move_snake(){
  // Move body
  for (let i = snake.length - 1; i > 0; i--){
    snake[i][0] = snake[i - 1][0];
    snake[i][1] = snake[i - 1][1];
  }

  // Move head
  if (direction === "up") {
    snake[0][1] -= SNAKE_SIZE;
  }
  else if (direction === "down") {
    snake[0][1] += SNAKE_SIZE;
  }
  else if (direction === "left") {
    snake[0][0] -= SNAKE_SIZE;
  }
  else if (direction === "right") {
    snake[0][0] += SNAKE_SIZE;
  }

  // Wrap around game window
  const [head_x, head_y] = snake[0];

  if (head_x < 0){
    snake[0][0] = CANVAS_WIDTH - SNAKE_SIZE;
  }
  else if (head_x >= CANVAS_WIDTH){
    snake[0][0] = 0;
  }
  else if (head_y < 0){
    snake[0][1] = CANVAS_HEIGHT - SNAKE_SIZE;
  }
  else if (head_y >= CANVAS_HEIGHT){
    snake[0][1] = 0;
  }
}

function keydown(event) {
  console.log(event);
  if (event.key === "w") {
    direction = "up";
  }
  if (event.key === "s") {
    direction = "down";
  }
  if (event.key === "a") {
    direction = "left";
  }
  if (event.key === "d") {
    direction = "right";
  }
}

initialize_body_parts(10)
setInterval(draw, 150);
setInterval(update_game, 150);
addEventListener("keydown", keydown);

</script>
</html>
