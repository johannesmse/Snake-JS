<html style="background-color: black;">
<canvas width=800 height=600 id="my_canvas">
</canvas>
<script>
const snake_size = 20
let x = 0;
let y = 0;

function draw(){
  const canvas = document.getElementById("my_canvas");
  console.log(canvas);
  const ctx = canvas.getContext("2d");
  ctx.beginPath(); // Start a new path
  ctx.rect(0, 0, 1000, 1000); // Add a rectangle to the current path
  ctx.fillStyle = "#ffffff";
  ctx.fill(); // Render the path
  ctx.beginPath(); // Start a new path
  ctx.rect(x, y, snake_size, snake_size); // Add a rectangle to the current path
  ctx.fillStyle = "#000000";
  ctx.fill(); // Render the path
}

function keydown(event) {
  console.log(event);
  if (event.key === "w") {
    y -= snake_size;
  }
  if (event.key === "s") {
    y += snake_size;
  }
  if (event.key === "a") {
    x -= snake_size;
  }
  if (event.key === "d") {
    x += snake_size;
  }
}

setInterval(draw, 20);

addEventListener("keydown", keydown);

</script>
</html>
