<html style="background-color: black;">
<canvas id="my_canvas"></canvas>

<script>
 
function random_int(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function random_grid_position(grid_size){
  return SNAKE_SIZE * random_int(0, (grid_size / SNAKE_SIZE) - 1);
}

const GAME_WINDOW_WIDTH = 800;
const GAME_WINDOW_HEIGHT = 600;
const MENU_WIDTH = 400;
const MENU_PADDING_X = 60;
const CANVAS_WIDTH = GAME_WINDOW_WIDTH + MENU_PADDING_X + MENU_WIDTH;
const CANVAS_HEIGHT = GAME_WINDOW_HEIGHT;
const MENU_START_X = GAME_WINDOW_WIDTH + MENU_PADDING_X;
const SNAKE_SIZE = 20;
const START_LENGTH = 4;
const VALID_TURNS = {
  "up" : ["left", "right"],
  "down" : ["left", "right"],
  "left"  : ["up", "down"],
  "right" : ["up", "down"]
};

const canvas = document.getElementById("my_canvas");
canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

const ctx = canvas.getContext("2d");

const food = [[random_grid_position(GAME_WINDOW_WIDTH), random_grid_position(GAME_WINDOW_HEIGHT)], [random_grid_position(GAME_WINDOW_WIDTH), random_grid_position(GAME_WINDOW_HEIGHT)]];
const input_queue = [];
const input_queue_max_length = 2;
let current_score = 0;
let highscore = 0;
let speed = 70;
let speed_increase_counter = 0;
let direction = "right";
let add_body_queue = 0;
let snake = [[GAME_WINDOW_WIDTH / 2, GAME_WINDOW_HEIGHT / 2]];

function draw(){
  console.log(speed);
  clear_screen();
  draw_snake();
  draw_food();
  draw_score();


  if (speed_increase_counter == 60){
    speed -= 1;
    speed_increase_counter = 0;
    clearInterval(game_interval);
    game_interval = setInterval(update_game, speed);
  }
  else if (speed > 20){
    speed_increase_counter += 1;
  }
}

function clear_screen(){
  // Clear game window
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, GAME_WINDOW_WIDTH, GAME_WINDOW_HEIGHT);
  
  // Clear menu window
  ctx.fillStyle = "grey";
  ctx.fillRect(GAME_WINDOW_WIDTH + MENU_PADDING_X, 0, MENU_WIDTH, GAME_WINDOW_HEIGHT);
}

function draw_snake(){
  // Draw snake head
  const [head_x, head_y] = snake[0];

  ctx.fillStyle = "red";
  ctx.strokeStyle = "green";
  ctx.fillRect(head_x, head_y, SNAKE_SIZE, SNAKE_SIZE); 
  ctx.strokeRect(head_x, head_y, SNAKE_SIZE, SNAKE_SIZE);

  // Draw snake body
  ctx.fillStyle = "green";
  for (let i = 1; i < snake.length; i++){
    const [x, y] = snake[i];

    ctx.fillRect(x, y, SNAKE_SIZE, SNAKE_SIZE); 
  }
}

function draw_score(){
  // Draw current score
  ctx.font = "40px Arial";
  ctx.fillStyle = "black";
  ctx.fillText("Score: " + current_score, MENU_START_X + MENU_WIDTH / 3.5, 200);

  // Draw Highscore
  ctx.font = "40px Arial";
  ctx.fillStyle = "black";
  ctx.fillText("Highscore: " + highscore, MENU_START_X + MENU_WIDTH / 5.5, 300);


}

function draw_food(){
  ctx.fillStyle = "blue";
  ctx.fillRect(food[0][0], food[0][1], SNAKE_SIZE, SNAKE_SIZE); 

  ctx.fillStyle = "purple";
  ctx.fillRect(food[1][0], food[1][1], SNAKE_SIZE, SNAKE_SIZE); 
}

function initialize_body_parts(n){
  for (let i = 0; i < n; i++){
    const [last_x, last_y] = snake[snake.length - 1];

    snake.push([last_x - SNAKE_SIZE, last_y]);
  }
}

function update_game(){
  move_snake();
  wrap_snake();

  if (collision_check()){
    restart_game();
  }
  const food_value = food_check();
  if (food_value === 1 || food_value === 3){
    add_body_queue += food_value;
    current_score += food_value * 10;
    respawn_food(food_value);
  }
}

function move_head(){
  if (direction === "up"){
    snake[0][1] -= SNAKE_SIZE;
  }
  else if (direction === "down"){
    snake[0][1] += SNAKE_SIZE;
  }
  else if (direction === "left"){
    snake[0][0] -= SNAKE_SIZE;
  }
  else if (direction === "right"){
    snake[0][0] += SNAKE_SIZE;
  }
}

function move_body(){
  for (let i = snake.length - 1; i > 0; i--){
    snake[i][0] = snake[i - 1][0];
    snake[i][1] = snake[i - 1][1];
  }
}

function move_snake(){
  if (input_queue.length > 0 && input_queue[0] in VALID_TURNS){
    if (VALID_TURNS[direction].includes(input_queue[0])){
      direction = input_queue[0];
    }
    input_queue.shift();
  }

  if (add_body_queue > 0){
    snake.unshift([...snake[0]]);
    add_body_queue --;
  }
  else {
    move_body();
  }

  move_head();
}

// Wrap around game window
function wrap_snake(){
  const [head_x, head_y] = snake[0];

  if (head_x < 0){
    snake[0][0] = GAME_WINDOW_WIDTH - SNAKE_SIZE;
  }
  else if (head_x >= GAME_WINDOW_WIDTH){
    snake[0][0] = 0;
  }
  else if (head_y < 0){
    snake[0][1] = GAME_WINDOW_HEIGHT - SNAKE_SIZE;
  }
  else if (head_y >= GAME_WINDOW_HEIGHT){
    snake[0][1] = 0;
  }
}

function collision_check(){
  const [head_x, head_y] = snake[0];

  for (let i = 1; i < snake.length; i++){
    if (head_x === snake[i][0] && head_y === snake[i][1]){
      return true;
    }
  }
  return false;
}

function food_check(){
  if (snake[0][0] === food[0][0] && snake[0][1] === food[0][1]){
    return 1;
  }
  else if (snake[0][0] === food[1][0] && snake[0][1] === food[1][1]){
    return 3;
  }
  else{
    return 0;
  }
}

function reset_snake(){
  snake = [[GAME_WINDOW_WIDTH / 2, GAME_WINDOW_HEIGHT / 2]];
  direction = "right";
  input_queue.length = 0;
  initialize_body_parts(START_LENGTH);
  
  
}

function restart_game(){
  reset_snake();
  reset_score();
  reset_speed();
  respawn_food(1);
  respawn_food(3);

}

function reset_score(){
  if (current_score > highscore){
    highscore = current_score;
  }
  current_score = 0;
}

function reset_speed(){
  speed = 70;
  speed_increase_counter = 0;
  clearInterval(game_interval);
  game_interval = setInterval(update_game, speed);
}

function respawn_food(food_value){
  if (food_value === 1){
    food[0][0] = random_grid_position(GAME_WINDOW_WIDTH);
    food[0][1] = random_grid_position(GAME_WINDOW_HEIGHT);
  }
  else{
    food[1][0] = random_grid_position(GAME_WINDOW_WIDTH);
    food[1][1] = random_grid_position(GAME_WINDOW_HEIGHT);
  }
  
}

function add_to_input_queue(command){
  if (input_queue.length === input_queue_max_length){
    return;
  }
  else if (input_queue.length > 0 && input_queue[input_queue.length - 1] === command){
    return;
  }
  else{
    input_queue.push(command);
  }
}

function keydown(event) {
  console.log(event);
  if (event.key === "w" || event.key === "ArrowUp") {
    add_to_input_queue("up");
  }
  if (event.key === "s" || event.key === "ArrowDown") {
    add_to_input_queue("down");
  }
  if (event.key === "a" || event.key === "ArrowLeft") {
    add_to_input_queue("left");
  }
  if (event.key === "d" || event.key === "ArrowRight") {
    add_to_input_queue("right");
  }
}



initialize_body_parts(START_LENGTH);
setInterval(draw, 20);
let game_interval = setInterval(update_game, speed);
addEventListener("keydown", keydown);

</script>
</html>
