<html style="background-color: black;">
<canvas width=800 height=600 id="my_canvas">
</canvas>
<script>
const snake_size = 20
let direction = "right"
let snake = [[200, 200]];

function draw(){
  const canvas = document.getElementById("my_canvas");
  const ctx = canvas.getContext("2d");

  ctx.beginPath(); 
  ctx.rect(0, 0, 800, 600); 
  ctx.fillStyle = "#ffffff";
  ctx.fill(); 

  // Draw snake head
  ctx.beginPath(); 
  ctx.rect(snake[0][0], snake[0][1], snake_size, snake_size); 
  ctx.fillStyle = "#ff0000";
  ctx.strokeStyle = "green";
  ctx.fill(); 
  ctx.stroke();

  // Draw snake body
  for (let i = 1; i < snake.length; i++){
    let x_pos = snake[i][0];
    let y_pos = snake[i][1];
    ctx.beginPath();
    ctx.rect(x_pos, y_pos, snake_size, snake_size); 
    ctx.fillStyle = "green";
    ctx.fill(); 
  }
}

function initialize_body_parts(n){
  for (let i = 0; i < n; i++){
    let last_element = snake.length - 1;
    let last_element_x = snake[last_element][0];
    let last_element_y = snake[last_element][1];
    snake.push([last_element_x - snake_size, last_element_y]);
  }
}

function update_game(){
  move_snake();
}

function move_snake(){
  // Move body
  for (let i = snake.length - 1; i > 0; i--){
    snake[i][0] = snake[i - 1][0];
    snake[i][1] = snake[i - 1][1];
  }

  // Move head
  if (direction === "up") {
    snake[0][1] -= snake_size;
  }
  else if (direction === "down") {
    snake[0][1] += snake_size;
  }
  else if (direction === "left") {
    snake[0][0] -= snake_size;
  }
  else if (direction === "right") {
    snake[0][0] += snake_size;
  }

  
}

function keydown(event) {
  console.log(event);
  if (event.key === "w") {
    direction = "up";
  }
  if (event.key === "s") {
    direction = "down";
  }
  if (event.key === "a") {
    direction = "left";
  }
  if (event.key === "d") {
    direction = "right";
  }
}

initialize_body_parts(4)
setInterval(draw, 20);
setInterval(update_game, 70);
addEventListener("keydown", keydown);

</script>
</html>
