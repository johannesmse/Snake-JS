<html style="background-color: black;">
<canvas id="my_canvas"></canvas>

<script>
 
function random_int(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function random_grid_position(grid_size){
  return SNAKE_SIZE * random_int(0, (grid_size / SNAKE_SIZE) - 1);
}

const CANVAS_WIDTH = 800;
const CANVAS_HEIGHT = 600;
const SNAKE_SIZE = 20;
const START_LENGTH = 4;
const VALID_TURNS = {
  "up" : ["left", "right"],
  "down" : ["left", "right"],
  "left"  : ["up", "down"],
  "right" : ["up", "down"]
};

const canvas = document.getElementById("my_canvas");
canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

const ctx = canvas.getContext("2d");

const food = [random_grid_position(CANVAS_WIDTH), random_grid_position(CANVAS_HEIGHT)];
let direction = "right";
let next_direction = "";
let add_body_queue = 0;
let snake = [[CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2]];

function draw(){
  clear_screen();
  draw_snake();
  draw_food();
}

function clear_screen(){
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function draw_snake(){
  // Draw snake head
  const [head_x, head_y] = snake[0];

  ctx.fillStyle = "red";
  ctx.strokeStyle = "green";
  ctx.fillRect(head_x, head_y, SNAKE_SIZE, SNAKE_SIZE); 
  ctx.strokeRect(head_x, head_y, SNAKE_SIZE, SNAKE_SIZE);

  // Draw snake body
  ctx.fillStyle = "green";
  for (let i = 1; i < snake.length; i++){
    const [x, y] = snake[i];

    ctx.fillRect(x, y, SNAKE_SIZE, SNAKE_SIZE); 
  }
}

function draw_food(){
  ctx.fillStyle = "blue";
  ctx.fillRect(food[0], food[1], SNAKE_SIZE, SNAKE_SIZE); 
}

function initialize_body_parts(n){
  for (let i = 0; i < n; i++){
    const [last_x, last_y] = snake[snake.length - 1];

    snake.push([last_x - SNAKE_SIZE, last_y]);
  }
}

function update_game(){
  move_snake();
  wrap_snake();

  if (collision_check()){
    reset_snake();
  }
  else if (food_check()){
    add_body_queue ++;
    respawn_food();
  }
}


function move_head(){
  if (VALID_TURNS[direction].includes(next_direction)){
    direction = next_direction;
  }

  if (direction === "up"){
    snake[0][1] -= SNAKE_SIZE;
  }
  else if (direction === "down"){
    snake[0][1] += SNAKE_SIZE;
  }
  else if (direction === "left"){
    snake[0][0] -= SNAKE_SIZE;
  }
  else if (direction === "right"){
    snake[0][0] += SNAKE_SIZE;
  }
}

function move_body(){
  for (let i = snake.length - 1; i > 0; i--){
    snake[i][0] = snake[i - 1][0];
    snake[i][1] = snake[i - 1][1];
  }
}

function move_snake(){
  if (add_body_queue > 0){
    snake.unshift([...snake[0]]);
    add_body_queue --;
  }
  else {
    move_body();
  }
  
  move_head();
}

function wrap_snake(){
  // Wrap around game window
  const [head_x, head_y] = snake[0];

  if (head_x < 0){
    snake[0][0] = CANVAS_WIDTH - SNAKE_SIZE;
  }
  else if (head_x >= CANVAS_WIDTH){
    snake[0][0] = 0;
  }
  else if (head_y < 0){
    snake[0][1] = CANVAS_HEIGHT - SNAKE_SIZE;
  }
  else if (head_y >= CANVAS_HEIGHT){
    snake[0][1] = 0;
  }
}

function collision_check(){
  const [head_x, head_y] = snake[0];

  for (let i = 1; i < snake.length; i++){
    if (head_x === snake[i][0] && head_y === snake[i][1]){
      return true;
    }
  }
  return false;
}

function food_check(){
  return snake[0][0] === food[0] && snake[0][1] === food[1];
}

function reset_snake(){
  snake = [[CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2]];
  direction = "right";
  next_direction = "";
  initialize_body_parts(START_LENGTH);
}

function respawn_food(){
  food[0] = random_grid_position(CANVAS_WIDTH);
  food[1] = random_grid_position(CANVAS_HEIGHT);
}

function keydown(event) {
  console.log(event);
  if (event.key === "w") {
    next_direction = "up";
  }
  if (event.key === "s") {
    next_direction = "down";
  }
  if (event.key === "a") {
    next_direction = "left";
  }
  if (event.key === "d") {
    next_direction = "right";
  }
}



initialize_body_parts(START_LENGTH);
setInterval(draw, 70);
setInterval(update_game, 70);
addEventListener("keydown", keydown);

</script>
</html>
